name: CI PR

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  validate:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"
          cache: maven

      - name: Configure Maven toolchains.xml
        shell: bash
        run: |
          mkdir -p "$HOME/.m2"
          cat > "$HOME/.m2/toolchains.xml" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains xmlns="http://maven.apache.org/TOOLCHAINS/1.1.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                      xsi:schemaLocation="http://maven.apache.org/TOOLCHAINS/1.1.0 https://maven.apache.org/xsd/toolchains-1.1.0.xsd">
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>${JAVA_HOME}</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          EOF

      - name: Run unit/integration tests
        run: mvn -B test

  package-smoke-windows:
    name: Package + Smoke (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "25"
          cache: maven

      - name: Configure Maven toolchains.xml
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.m2" | Out-Null
          @"
          <?xml version="1.0" encoding="UTF-8"?>
          <toolchains xmlns="http://maven.apache.org/TOOLCHAINS/1.1.0"
                      xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                      xsi:schemaLocation="http://maven.apache.org/TOOLCHAINS/1.1.0 https://maven.apache.org/xsd/toolchains-1.1.0.xsd">
            <toolchain>
              <type>jdk</type>
              <provides>
                <version>25</version>
              </provides>
              <configuration>
                <jdkHome>$env:JAVA_HOME</jdkHome>
              </configuration>
            </toolchain>
          </toolchains>
          "@ | Set-Content -Path "$HOME\.m2\toolchains.xml" -Encoding UTF8

      - name: Package jar
        run: mvn -B package -DskipTests

      - name: Smoke run
        shell: pwsh
        run: |
          java -jar target/deployment-mapper-1.0.0-SNAPSHOT.jar --input examples/acme_example_manifest.yaml --output-dir out-ci --clean-db
          if (!(Test-Path "out-ci\deployment-map.puml")) { throw "Missing deployment-map.puml" }
          if (!(Test-Path "out-ci\deployment-map.png")) { throw "Missing deployment-map.png" }

